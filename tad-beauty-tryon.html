<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAD Beauty — Virtual Lash Try-On</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #060404;
    --deep: #120d0d;
    --panel: #1a1212;
    --rose: #c9906a;
    --gold: #d4a96a;
    --ivory: #f5e6d3;
    --white: #fdf9f6;
    --muted: #7a6a62;
    --border: rgba(201,144,106,0.18);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:var(--black); color:var(--ivory); font-family:'Jost',sans-serif; overflow:hidden; }

  #app {
    display:grid;
    grid-template-columns: 1fr 340px;
    grid-template-rows: 56px 1fr;
    height:100vh;
    max-width:1100px;
    margin:0 auto;
  }

  /* ── Header ── */
  header {
    grid-column: 1/-1;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 28px;
    border-bottom:1px solid var(--border);
    background:var(--black);
  }
  .logo {
    font-family:'Cormorant Garamond',serif;
    font-size:1.35rem; font-weight:500; letter-spacing:.28em;
    color:var(--white); text-transform:uppercase;
  }
  .logo span { color:var(--rose); }
  .badge {
    display:flex; align-items:center; gap:8px;
    font-size:.65rem; font-weight:400; letter-spacing:.18em;
    color:var(--rose); text-transform:uppercase;
  }
  .badge::before {
    content:''; width:6px; height:6px; border-radius:50%;
    background:var(--rose); animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.4)} }

  /* ── Camera Section ── */
  #camera-wrap {
    position:relative; background:var(--deep);
    overflow:hidden; display:flex; align-items:center; justify-content:center;
    aspect-ratio: 16 / 9;
    width: 100%;
    align-self: center;
  }
  #output_canvas {
    width:100%; height:100%;
    object-fit:cover; display:block;
    transform:scaleX(-1); /* mirror back to correct — canvas already mirrors internally */
  }
  /* Vignette overlay */
  #camera-wrap::after {
    content:''; position:absolute; inset:0; pointer-events:none;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(6,4,4,0.7) 100%);
  }

  #idle-msg {
    position:absolute; text-align:center; pointer-events:none;
    display:flex; flex-direction:column; align-items:center; gap:14px;
  }
  .eye-icon { font-size:2.5rem; opacity:.3; }
  #idle-msg p { font-size:.75rem; letter-spacing:.14em; color:var(--muted); text-transform:uppercase; }

  #loading-bar {
    position:absolute; bottom:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg, var(--rose), var(--gold));
    transform:scaleX(0); transform-origin:left;
    transition:transform 3s ease;
  }
  #loading-bar.active { transform:scaleX(1); }

  /* ── Right Panel ── */
  #panel {
    background:var(--panel);
    border-left:1px solid var(--border);
    display:flex; flex-direction:column;
    overflow:hidden;
  }

  .panel-title {
    padding:24px 22px 16px;
    border-bottom:1px solid var(--border);
  }
  .panel-title h2 {
    font-family:'Cormorant Garamond',serif;
    font-size:1.5rem; font-weight:300; letter-spacing:.06em;
    color:var(--white);
  }
  .panel-title p {
    font-size:.68rem; color:var(--muted); letter-spacing:.12em;
    text-transform:uppercase; margin-top:4px;
  }

  /* Style grid */
  .styles-grid {
    flex:1; overflow-y:auto; padding:16px;
    display:grid; grid-template-columns:1fr 1fr; gap:10px;
    scrollbar-width:none;
  }
  .style-card {
    background:var(--deep); border:1px solid var(--border);
    border-radius:4px; padding:14px 12px;
    cursor:pointer; transition:all .22s ease;
    display:flex; flex-direction:column; align-items:center; gap:10px;
    position:relative; overflow:hidden;
  }
  .style-card:hover { border-color:var(--rose); background:#1f1515; }
  .style-card.active {
    border-color:var(--rose); background:#221616;
  }
  .style-card.active::after {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg, var(--rose), var(--gold));
  }

  /* Eye SVG per style */
  .eye-svg { width:64px; height:28px; }

  .style-name {
    font-size:.65rem; letter-spacing:.16em; text-transform:uppercase;
    color:var(--muted); font-weight:400;
  }
  .style-card.active .style-name { color:var(--rose); }

  .style-desc {
    font-size: .55rem; letter-spacing: .1em; color: var(--muted);
    text-transform: uppercase; margin-top: -4px; text-align: center;
  }

  /* Bottom section */
  .panel-bottom {
    padding:16px 22px 20px;
    border-top:1px solid var(--border);
  }
  .current-style {
    font-family:'Cormorant Garamond',serif;
    font-size:.85rem; letter-spacing:.1em; color:var(--muted);
    text-transform:uppercase; margin-bottom:8px;
  }
  .current-style strong { color:var(--ivory); font-weight:500; font-size:1rem; }

  .btn-primary {
    width:100%; padding:13px;
    background:linear-gradient(135deg, var(--rose), var(--gold));
    border:none; border-radius:2px;
    font-family:'Jost',sans-serif;
    font-size:.7rem; font-weight:500; letter-spacing:.2em; text-transform:uppercase;
    color:var(--black); cursor:pointer;
    transition:opacity .2s;
  }
  .btn-primary:hover { opacity:.88; }

  #status-text {
    font-size:.6rem; letter-spacing:.1em; color:var(--muted);
    text-transform:uppercase; text-align:center; margin-top:10px;
    min-height:14px;
  }

  video#input_video { display:none; }
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="logo">TAD <span>Beauty</span></div>
    <div class="badge">Live Try-On</div>
    <div style="font-size:.65rem;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;">Virtual Studio</div>
  </header>

  <div id="camera-wrap">
    <canvas id="output_canvas"></canvas>
    <div id="idle-msg">
      <div class="eye-icon">👁</div>
      <p>Allow camera access to begin</p>
    </div>
    <div id="loading-bar"></div>
  </div>

  <div id="panel">
    <div class="panel-title">
      <h2>Lash Styles</h2>
      <p>Choose your look</p>
    </div>

    <div class="styles-grid" id="styles-grid"></div>

    <div class="panel-bottom">
      <div class="current-style">Selected: <strong id="style-label">Natural</strong></div>
      <button class="btn-primary">Add to Bag →</button>
      <div id="status-text">Initializing face tracking…</div>
    </div>
  </div>
</div>

<video id="input_video" playsinline></video>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script>
// ─── Lash Styles ──────────────────────────────────────────────
const STYLES = {
  Aura: {
    count: 22, baseLength: 13, curl: 0.25, thickness: 1.8, wispy: false,
    distribution: 'round',
    innerMult: 0.75, outerMult: 0.75
  },
  Gaze: {
    count: 18, baseLength: 15, curl: 0.12, thickness: 1.7, wispy: false,
    distribution: 'winged',
    innerMult: 0.55, outerMult: 0.85
  },
  Lush: {
    count: 8, baseLength: 14, curl: 0.15, thickness: 2.6, wispy: true,
    distribution: 'spiky',
    innerMult: 0.75, outerMult: 0.95
  },
  Muse: {
    count: 7, baseLength: 15, curl: 0.30, thickness: 1.1, wispy: true,
    distribution: 'manga',
    innerMult: 0.50, outerMult: 1.0
  },
};

// ─── Lash Mapping Logic ───────────────────────────────────────
function getLashLength(index, total, style) {
  const t = index / Math.max(total - 1, 1);
  const { baseLength, innerMult, outerMult, distribution } = style;
  let scaleFactor = 1.0;

  if (distribution === 'round') {
    // Aura: vòm đối xứng — sin curve, min 70%
    scaleFactor = 0.70 + Math.sin(t * Math.PI) * 0.30;

  } else if (distribution === 'winged') {
    // Gaze: cat-eye — dài dần 80% đầu, hơi ngắn lại 20% cuối
    if (t < 0.8) {
      scaleFactor = innerMult + (t / 0.8) * (1.0 - innerMult);
    } else {
      scaleFactor = 1.0 - ((t - 0.8) / 0.2) * (1.0 - outerMult);
    }

  } else if (distribution === 'spiky' || distribution === 'manga') {
    // Lush/Muse: cụm spike, sợi chính dài 100%, sợi tơ 70%
    const spikeInterval = Math.max(1, Math.floor(total / style.count));
    const isSpike = index % spikeInterval === 0;
    scaleFactor = isSpike ? 1.0 : 0.70;
    // Áp thêm slope theo chiều mắt
    const slope = innerMult + t * (outerMult - innerMult);
    scaleFactor *= slope;
  }

  return baseLength * scaleFactor;
}

// Eye landmark indices (MediaPipe Face Mesh)
const L_UPPER = [246,161,160,159,158,157];
const R_UPPER = [466,388,387,386,385,384];
const L_ALL   = [33,246,161,160,159,158,157,173,133,155,154,153,145,144,163,7];
const R_ALL   = [263,466,388,387,386,385,384,398,362,382,381,380,374,373,390,249];

// ─── Eye SVG generator per style ──────────────────────────────
function buildEyeSVG(styleName) {
  const s = STYLES[styleName];
  let lashes = '';
  const ex = 32, ey = 18, ew = 26;
  const previewCount = Math.min(s.count * (s.wispy ? 3 : 2), 14);
  for (let i = 0; i < previewCount; i++) {
    const t = i / Math.max(previewCount - 1, 1);
    const bx = ex - ew + t * ew*2;
    const arcY = ey - Math.sqrt(Math.max(0, ew*ew - (bx-ex)*(bx-ex))) * 0.55;
    const tsin = Math.sin(t * Math.PI);
    const rawLen = getLashLength(i, previewCount, s);
    const len = rawLen * 0.50;   // scale mm → SVG px
    const dx = (bx - ex)/(ew||1) * 0.35;
    const dy = -1;
    const norm = Math.sqrt(dx*dx+dy*dy)||1;
    const nx = dx/norm, ny = dy/norm;
    const ex2 = bx + nx*len + (-ny)*len*s.curl*0.5;
    const ey2 = arcY + ny*len + nx*len*s.curl*0.5;
    const cpx = bx + nx*len*0.5 + (-ny)*len*s.curl;
    const cpy = arcY + ny*len*0.5 + nx*len*s.curl;
    const w = s.thickness * (0.3 + 0.7*tsin) * 0.55;
    lashes += `<path d="M${bx.toFixed(1)},${arcY.toFixed(1)} Q${cpx.toFixed(1)},${cpy.toFixed(1)} ${ex2.toFixed(1)},${ey2.toFixed(1)}" stroke="#c9906a" stroke-width="${w.toFixed(2)}" fill="none" stroke-linecap="round"/>`;
  }
  // eye outline
  const eye = `<ellipse cx="${ex}" cy="${ey+3}" rx="${ew}" ry="8" fill="none" stroke="#3a2a2a" stroke-width="1"/>
               <ellipse cx="${ex}" cy="${ey+3}" rx="5" ry="5" fill="#1a1010"/>`;
  return `<svg class="eye-svg" viewBox="0 0 64 34" xmlns="http://www.w3.org/2000/svg">${eye}${lashes}</svg>`;
}

// ─── Build style cards ─────────────────────────────────────────
let currentStyle = 'Aura';
const grid = document.getElementById('styles-grid');
const STYLE_DESCS = {
  Aura: 'Balanced · Full',
  Gaze: 'Cat-Eye · Lifted',
  Lush: 'Dense · Voluminous',
  Muse: 'Feathery · Asymmetric'
};
Object.keys(STYLES).forEach(name => {
  const card = document.createElement('div');
  card.className = 'style-card' + (name === currentStyle ? ' active' : '');
  card.dataset.style = name;
  const desc = `<span class="style-desc">${STYLE_DESCS[name]}</span>`;
  card.innerHTML = buildEyeSVG(name) + `<span class="style-name">${name}</span>` + desc;
  card.addEventListener('click', () => {
    document.querySelectorAll('.style-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
    currentStyle = name;
    document.getElementById('style-label').textContent = name;
  });
  grid.appendChild(card);
});

// ─── MediaPipe Setup ──────────────────────────────────────────
const videoEl  = document.getElementById('input_video');
const canvasEl = document.getElementById('output_canvas');
const ctx      = canvasEl.getContext('2d');
const idleMsg  = document.getElementById('idle-msg');
const statusEl = document.getElementById('status-text');
const loadBar  = document.getElementById('loading-bar');

let faceDetected = false;

function setCanvasSize() {
  const wrap = document.getElementById('camera-wrap');
  canvasEl.width  = wrap.clientWidth;
  canvasEl.height = wrap.clientHeight;
}
setCanvasSize();
window.addEventListener('resize', setCanvasSize);

// ─── Draw lashes for one eye ──────────────────────────────────
function drawLashes(landmarks, upperIdx, allIdx) {
  const s = STYLES[currentStyle];
  const W = canvasEl.width, H = canvasEl.height;

  // Convert normalized → pixel (mirrored: x = 1-x)
  const toPx = i => ({
    x: (1 - landmarks[i].x) * W,
    y: landmarks[i].y * H
  });

  const upper = upperIdx.map(toPx);
  const all   = allIdx.map(toPx);

  // Eye center
  const cx = all.reduce((s,p)=>s+p.x,0)/all.length;
  const cy = all.reduce((s,p)=>s+p.y,0)/all.length;
  const xs = all.map(p=>p.x);
  const eyeW = Math.max(...xs) - Math.min(...xs);

  const totalFibers = s.count * (s.wispy ? 3 : 2);

  for (let li = 0; li < totalFibers; li++) {
    const t = li / Math.max(totalFibers - 1, 1);
    const ridx = t * (upper.length - 1);
    const i0 = Math.floor(ridx);
    const i1 = Math.min(i0+1, upper.length-1);
    const fr = ridx - i0;
    const px = upper[i0].x*(1-fr) + upper[i1].x*fr;
    const py = upper[i0].y*(1-fr) + upper[i1].y*fr;

    // Outward direction from eye center
    const ddx = px-cx, ddy = py-cy;
    const dlen = Math.sqrt(ddx*ddx + ddy*ddy) || 1;
    const nx = ddx/dlen, ny = ddy/dlen;

    // Upward perpendicular (for curl)
    let px2 = -ny, py2 = nx;
    if (py2 > 0) { px2 = ny; py2 = -nx; }

    // Scale mm → px: eyeW pixel ≈ 15mm thực tế
    const mmToPx = eyeW / 15;
    const rawLen = getLashLength(li, totalFibers, s);
    const llen   = rawLen * mmToPx;
    const tNorm  = Math.sin(t * Math.PI);
    const lthick = s.thickness * (0.25 + 0.75 * tNorm);

    const cpx = px + nx*llen*0.45 + px2*llen*s.curl;
    const cpy = py + ny*llen*0.45 + py2*llen*s.curl;
    const ex  = px + nx*llen       + px2*llen*s.curl*0.6;
    const ey  = py + ny*llen       + py2*llen*s.curl*0.6;

    // Wispy: alternate thick/thin
    const finalThick = s.wispy && li%3===1 ? lthick*0.5 : lthick;

    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.quadraticCurveTo(cpx, cpy, ex, ey);
    ctx.strokeStyle = 'rgba(6,2,2,0.93)';
    ctx.lineWidth = finalThick;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Wispy adds a second thinner strand nearby
    if (s.wispy && li%2===0 && li < totalFibers-1) {
      const offset = eyeW * 0.008;
      ctx.beginPath();
      ctx.moveTo(px + offset, py);
      ctx.quadraticCurveTo(cpx+offset, cpy - llen*0.08, ex+offset*0.5, ey - llen*0.12);
      ctx.strokeStyle = 'rgba(6,2,2,0.6)';
      ctx.lineWidth = finalThick * 0.45;
      ctx.stroke();
    }
  }
}

// ─── On face results ──────────────────────────────────────────
function onResults(results) {
  const W = canvasEl.width, H = canvasEl.height;
  ctx.clearRect(0, 0, W, H);

  // Draw mirrored video
  ctx.save();
  ctx.translate(W, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(results.image, 0, 0, W, H);
  ctx.restore();

  if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
    if (!faceDetected) {
      faceDetected = true;
      idleMsg.style.display = 'none';
      statusEl.textContent = 'Face detected — try different styles!';
    }
    const lm = results.multiFaceLandmarks[0];
    drawLashes(lm, L_UPPER, L_ALL);
    drawLashes(lm, R_UPPER, R_ALL);
  } else {
    if (faceDetected) {
      statusEl.textContent = 'Looking for your face…';
      faceDetected = false;
    }
  }
}

// ─── Init MediaPipe ──────────────────────────────────────────
const faceMesh = new FaceMesh({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
});
faceMesh.setOptions({
  maxNumFaces: 1,
  refineLandmarks: true,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});
faceMesh.onResults(onResults);

loadBar.classList.add('active');

const camera = new Camera(videoEl, {
  onFrame: async () => {
    await faceMesh.send({ image: videoEl });
  },
  width: 1280, height: 720
});

camera.start().then(() => {
  statusEl.textContent = 'Camera ready — allow access above';
}).catch(err => {
  statusEl.textContent = 'Camera blocked — check browser permissions';
  console.error(err);
});

setTimeout(() => {
  if (!faceDetected) statusEl.textContent = 'Position your face in the camera';
}, 4000);
</script>
</body>
</html>
